{% extends 'users/base.html' %}

{% block content %}
<div class="container">
    <h1>Register</h1>
    <div class="links">
        <a href="{% url 'login' %}">Login</a> | 
        <a href="{% url 'register' %}">Register</a>
    </div>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
</div>
{% endblock %}
